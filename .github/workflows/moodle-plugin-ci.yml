name: Moodle Plugin CI

on:
  push:
    branches:
      - main
      - 'MOODLE_*'
  pull_request:
    branches:
      - main
      - 'MOODLE_*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: moodle
          POSTGRES_PASSWORD: moodle
          POSTGRES_DB: moodle
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
        moodle-branch: ['MOODLE_405_STABLE']
        database: ['pgsql']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pgsql, zip, gd, xmlrpc, soap
          coverage: none

      - name: Install Moodle Plugin CI
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci && pwd)/bin >> $GITHUB_PATH
          echo $(cd ci && pwd)/vendor/bin >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8

      - name: Install Moodle
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --db-host=127.0.0.1 \
            --db-type=${{ matrix.database }} \
            --db-name=moodle \
            --db-user=moodle \
            --db-pass=moodle \
            --branch=${{ matrix.moodle-branch }}
        env:
          DB: ${{ matrix.database }}

      - name: PHP Lint
        if: always()
        run: moodle-plugin-ci phplint

      - name: PHP Copy/Paste Detector
        if: always()
        run: moodle-plugin-ci phpcpd

      - name: PHP Mess Detector
        if: always()
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker (PHP_CodeSniffer)
        if: always()
        run: moodle-plugin-ci codechecker

      - name: Moodle PHPDoc Checker
        if: always()
        run: moodle-plugin-ci phpdoc

      - name: Validating
        if: always()
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: always()
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: always()
        run: moodle-plugin-ci mustachelint

      - name: JavaScript Lint
        if: always()
        run: moodle-plugin-ci jshint

      - name: CSS Lint
        if: always()
        run: moodle-plugin-ci stylelint

      - name: PHPUnit
        if: always()
        run: moodle-plugin-ci phpunit --coverage-text

      - name: Behat
        if: always()
        run: moodle-plugin-ci behat --profile chrome
